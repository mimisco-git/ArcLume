name: Update ArcLume community feed

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update-community-json:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Update community JSON
        run: python scripts/update_community.py

      - name: Commit refreshed community JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/community.json
          if git diff --cached --quiet; then
            echo "No community feed changes detected"
          else
            git commit -m "chore: refresh ArcLume community feed"
            git push
          fi
